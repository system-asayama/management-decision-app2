{% extends "financial_base.html" %}

{% block title %}企業新規登録 - 経営意思決定支援システム{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-building"></i> 企業新規登録</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('financial_ui.company_new') }}">
                        <div class="mb-3">
                            <label for="name" class="form-label">企業名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="例: 株式会社サンプル">
                        </div>
                        
                        <div class="mb-3">
                            <label for="industry" class="form-label">業種</label>
                            <select class="form-select" id="industry" name="industry">
                                <option value="">選択してください</option>
                                <option value="製造業">製造業</option>
                                <option value="建設業">建設業</option>
                                <option value="卸売業">卸売業</option>
                                <option value="小売業">小売業</option>
                                <option value="サービス業">サービス業</option>
                                <option value="情報通信業">情報通信業</option>
                                <option value="運輸業">運輸業</option>
                                <option value="不動産業">不動産業</option>
                                <option value="飲食業">飲食業</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="employee_count" class="form-label">従業員数</label>
                            <input type="number" class="form-control" id="employee_count" name="employee_count" min="0" placeholder="例: 50">
                            <small class="form-text text-muted">正社員・パート・アルバイトを含む総数</small>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('financial_ui.companies') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> キャンセル
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> 登録
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
